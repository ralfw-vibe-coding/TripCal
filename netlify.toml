[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  included_files = ["requirements/daily_allowances_bulgaria_en.csv"]

[[redirects]]
  from = "/api/documents/*"
  to = "/.netlify/functions/documents/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
